<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            margin-bottom: 10px;
            color: #4CAF50;
            text-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 15px;
        }

        /* Nokia style green-screen canvas border */
        canvas {
            background-color: #8fad8b;
            border: 10px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 4px;
            display: block;
        }

        /* Mobile Controls */
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
        }

        .btn {
            background-color: #444;
            color: white;
            border: 2px solid #666;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px #222;
        }

        .btn:active {
            box-shadow: 0 1px #222;
            transform: translateY(3px);
        }

        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }
        
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score-board">Score: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- On-screen D-Pad for mobile users -->
    <div class="controls">
        <button class="btn" id="up">↑</button>
        <button class="btn" id="left">←</button>
        <button class="btn" id="right">→</button>
        <button class="btn" id="down">↓</button>
    </div>

    <div class="instructions">
        Use Arrow Keys on PC or buttons below on Phone.
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Game speed variables
        let gameLoopInterval;
        let score = 0;

        // Snake setup
        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];

        // Food setup
        let food = { x: 5, y: 5 };

        // Direction vectors
        let dx = 1;
        let dy = 0;
        let changingDirection = false;

        // Start the game loop
        function startGame() {
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(drawGame, 100); // 100ms = Classic speed
        }

        function drawGame() {
            clearCanvas();
            moveSnake();
            
            if (checkGameOver()) {
                alert("Game Over! Your Score: " + score);
                resetGame();
                return;
            }

            checkFoodCollision();
            drawFood();
            drawSnake();
            changingDirection = false;
        }

        function clearCanvas() {
            ctx.fillStyle = "#8fad8b"; // Classic Nokia greenish background
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Classic dark gray pixels for the snake body
                ctx.fillStyle = index === 0 ? "#051c05" : "#223b22";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function drawFood() {
            ctx.fillStyle = "#051c05"; // Pixelated food block
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
            snake.pop();
        }

        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
                // Grow snake by keeping the tail
                const tail = { ...snake[snake.length - 1] };
                snake.push(tail);
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Make sure food doesn't spawn on top of the snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function checkGameOver() {
            // Wall hits
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // Self bites
            for (let i = 1; i < snake.length; i++) {
                if (snake[0].x === snake[i].x && snake[0].y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            generateFood();
            startGame();
        }

        // Keyboard Controls (PC)
        document.addEventListener("keydown", (event) => {
            if (changingDirection) return;

            const keyPressed = event.key;
            if (keyPressed === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; changingDirection = true; }
            if (keyPressed === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; changingDirection = true; }
            if (keyPressed === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; changingDirection = true; }
            if (keyPressed === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; changingDirection = true; }
        });

        // Button Controls (Mobile/Click)
        document.getElementById("up").addEventListener("click", () => { if (dy !== 1) { dx = 0; dy = -1; } });
        document.getElementById("down").addEventListener("click", () => { if (dy !== -1) { dx = 0; dy = 1; } });
        document.getElementById("left").addEventListener("click", () => { if (dx !== 1) { dx = -1; dy = 0; } });
        document.getElementById("right").addEventListener("click", () => { if (dx !== -1) { dx = 1; dy = 0; } });

        // Run game setup
        generateFood();
        startGame();
    </script>
</body>
</html>
